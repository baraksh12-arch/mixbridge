name: MixBridge
options:
  bundleIdPrefix: audio.mixbridge
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_BITCODE: NO
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  MixBridge:
    type: application
    platform: iOS
    sources:
      - path: MixBridge/Sources
        excludes:
          - Resources/XcodeProjectNotes.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: audio.mixbridge.iOSApp
        INFOPLIST_FILE: MixBridge/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        GENERATE_INFOPLIST_FILE: NO
    info:
      path: MixBridge/Resources/Info.plist
      properties:
        UILaunchScreen: {}
        NSLocalNetworkUsageDescription: "MixBridge streams audio from your DAW over your local Wi-Fi network."
        NSBonjourServices:
          - _mixbridge._udp.
        UIBackgroundModes:
          - audio
