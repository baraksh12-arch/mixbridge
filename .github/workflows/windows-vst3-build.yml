name: Windows VST3 Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout MixBridge
        uses: actions/checkout@v4

      - name: Checkout JUCE
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.12
          path: JUCE

      - name: Configure CMake
        run: >
          cmake -B build
          -DJUCE_DIR="${{ github.workspace }}/JUCE"
          -G "Visual Studio 17 2022"
          -A x64

      - name: Build VST3
        run: cmake --build build --config Release --target MixBridge_VST3 --parallel

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: MixBridge-Windows-VST3-x64
          path: build/MixBridge_artefacts/Release/VST3/MixBridge.vst3
